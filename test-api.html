<!DOCTYPE html>
<html>
<head>
    <title>Teste API</title>
</head>
<body>
    <h1>Teste de Conexão com API</h1>
    <button onclick="testHealth()">Testar Health Check</button>
    <button onclick="testCadastro()">Testar Rota de Cadastro</button>
    <div id="result"></div>

    <script>
        async function testHealth() {
            try {
                const response = await fetch('http://localhost:3001/api/health');
                const data = await response.json();
                document.getElementById('result').innerHTML = 
                    '<pre style="color:green">✅ Sucesso!<br>' + 
                    JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    '<pre style="color:red">❌ Erro: ' + error.message + '</pre>';
            }
        }

        async function testCadastro() {
            try {
                const response = await fetch('http://localhost:3001/api/auth/cadastrar-gestor', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name: 'Teste',
                        email: 'teste@teste.com',
                        password: '123456',
                        confirmPassword: '123456',
                        phone: '11999999999',
                        address: 'Rua Teste, 123',
                        clinicName: 'Clínica Teste'
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Erro na requisição');
                }
                
                const data = await response.json();
                document.getElementById('result').innerHTML = 
                    '<pre style="color:green">✅ Sucesso!<br>' + 
                    JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    '<pre style="color:red">❌ Erro: ' + error.message + '</pre>';
            }
        }
    </script>
</body>
</html>
